<BODY>
<P><STRONG><FONT color=#800000>集群战斗 Pack 
Fighting</FONT></STRONG><BR><EM>战斗风格专长（先决：战斗风格特性）</EM><BR>当你以武器或徒手打击对生物发动近战攻击时，若该生物5尺内存在有至少一名你的盟友，且该盟友未陷入失能状态，你的伤害掷骰获得+1加值。若该生物5尺内存在有至少一名也具有此专长且未陷入失能状态的你的盟友，此加值提升至+2。</P>
<P><STRONG><FONT color=#800000>俯卧战斗 Prone 
Fighting</FONT></STRONG><BR><EM>战斗风格专长（先决：战斗风格特性）</EM><BR>在你陷入倒地Prone状态期间，你不会由于倒地状态而在攻击检定上具有劣势，且倒地状态不会为对你发动的攻击提供优势。</P>
