<H1>次生元素 Para-elementals</H1>
<P>在构成多元宇宙基础的气、土、火、水四大元素位面之间，横亘着诸个<STRONG>次生元素位面Para-elemental 
Planes</STRONG>——这是元素位面相互碰撞、元素物质交融混杂的交界区域。这些次生元素位面分别是：<STRONG>灰烬位面Plane of 
Ash</STRONG>、<STRONG>寒冰位面Plane of Ice</STRONG>、<STRONG>熔岩位面Plane of 
Magma</STRONG>以及<STRONG>软泥位面Plane of 
Ooze</STRONG>。这些位面也是次生元素们的家园：即<STRONG><U>烟雾元素Smoke 
Elementals</U></STRONG>、<STRONG><U>寒冰元素Ice 
Elementals</U></STRONG>、<STRONG><U>熔岩元素Magma 
Elementals</U></STRONG>与<STRONG><U>泥浆元素Mud&nbsp;Elementals</U></STRONG> 
    
    
。</P>
